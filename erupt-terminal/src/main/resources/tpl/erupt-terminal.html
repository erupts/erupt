<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <base href="${base}/">
    <title>erupt terminal</title>
    <link href="terminal/xterm.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; background: #141920; display: flex; flex-direction: column; overflow: hidden; }

        /* ── Tab bar ── */
        #tab-bar {
            display: flex;
            align-items: center;
            height: 38px;
            min-height: 38px;
            background: #141920;
            padding: 0;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
        }
        #tab-bar::-webkit-scrollbar { display: none; }

        .tab {
            display: flex;
            align-items: center;
            gap: 6px;
            height: 33px;
            padding: 0 10px 0 14px;
            margin-right: 2px;
            cursor: pointer;
            color: #5c6370;
            font: 12px/1 system-ui, sans-serif;
            white-space: nowrap;
            flex-shrink: 0;
            transition: background .12s, color .12s;
            position: relative;
        }
        .tab:hover { background: #1b2027; color: #abb2bf; }
        .tab.active { background: #1b2027; color: #abb2bf; }
        .tab.active::before { left: -6px; border-radius: 0 0 6px 0; box-shadow: 3px 0 0 #1b2027; }
        .tab.active::after  { right: -6px; border-radius: 0 0 0 6px; box-shadow: -3px 0 0 #1b2027; }

        .tab-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #528bff;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity .2s;
        }
        .tab.has-activity .tab-dot { opacity: 1; }

        .tab-close {
            width: 16px; height: 16px;
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px;
            color: transparent;
            transition: background .1s, color .1s;
            flex-shrink: 0;
            line-height: 1;
        }
        .tab:hover .tab-close,
        .tab.active .tab-close { color: #5c6370; }
        .tab-close:hover { background: #e06c75 !important; color: #fff !important; }

        #tab-bar-tabs { display: flex; align-items: flex-end; flex: 1; overflow-x: auto; overflow-y: hidden; scrollbar-width: none; }
        #tab-bar-tabs::-webkit-scrollbar { display: none; }

        #btn-add-tab {
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px;
            cursor: pointer;
            color: #abb2bf;
            font-size: 20px;
            flex-shrink: 0;
            margin: 0 4px;
            transition: background .12s, color .12s;
            user-select: none;
        }
        #btn-add-tab:hover { background: #2a3340; color: #fff; }

        /* ── Terminal area ── */
        #terminals { flex: 1; background: #1b2027; position: relative; overflow: hidden; }

        .term-wrap {
            position: absolute;
            inset: 0;
            padding: 8px 12px;
            display: none;
        }
        .term-wrap.active { display: block; }
        .xterm { height: 100%; }
        .xterm-viewport { overflow-y: auto !important; }
    </style>
</head>
<body>

<div id="tab-bar">
    <div id="tab-bar-tabs"></div>
    <div id="btn-add-tab" title="New tab (Alt+T)">+</div>
</div>
<div id="terminals"></div>

<script src="terminal/xterm.min.js"></script>
<script src="terminal/addon-fit.min.js"></script>
<script>
(function () {
    function getParam(name) {
        var q = window.location.search.substring(1).split('&');
        for (var i = 0; i < q.length; i++) {
            var p = q[i].split('=');
            if (p[0] === name) return decodeURIComponent(p[1] || '');
        }
        return '';
    }

    var TERM_THEME = {
        background:          '#1b2027',
        foreground:          '#abb2bf',
        cursor:              '#528bff',
        cursorAccent:        '#1b2027',
        selectionBackground: 'rgba(82,139,255,0.25)',
        black:               '#1b2027',
        red:                 '#e06c75',
        green:               '#98c379',
        yellow:              '#e5c07b',
        blue:                '#61afef',
        magenta:             '#c678dd',
        cyan:                '#56b6c2',
        white:               '#abb2bf',
        brightBlack:         '#5c6370',
        brightRed:           '#e06c75',
        brightGreen:         '#98c379',
        brightYellow:        '#e5c07b',
        brightBlue:          '#61afef',
        brightMagenta:       '#c678dd',
        brightCyan:          '#56b6c2',
        brightWhite:         '#ffffff'
    };

    var token    = getParam('_token');
    var protocol = location.protocol === 'https:' ? 'wss' : 'ws';
    var wsUrl    = protocol + '://' + location.host + '/erupt-terminal?token=' + encodeURIComponent(token);

    var tabs      = [];
    var activeId  = null;
    var tabSeq    = 0;

    // ── Create a new tab ──────────────────────────────────────────────
    function createTab() {
        tabSeq++;
        var id = tabSeq;

        // Deactivate all existing tabs immediately
        tabs.forEach(function (t) {
            document.getElementById('wrap-' + t.id).classList.remove('active');
            document.getElementById('tab-' + t.id).classList.remove('active');
        });
        activeId = id;

        // wrap starts active so fit.fit() measures real dimensions
        var wrap = document.createElement('div');
        wrap.className = 'term-wrap active';
        wrap.id = 'wrap-' + id;
        document.getElementById('terminals').appendChild(wrap);

        // xterm instance
        var term = new Terminal({
            cursorBlink: true,
            cursorStyle: 'bar',
            fontSize: 14,
            fontFamily: '"JetBrains Mono","Fira Code","Cascadia Code",Menlo,Monaco,"Courier New",monospace',
            lineHeight: 1.25,
            theme: TERM_THEME
        });
        var fit = new FitAddon.FitAddon();
        term.loadAddon(fit);
        term.open(wrap);

        // DOM: tab button (active immediately)
        var tabEl = document.createElement('div');
        tabEl.className = 'tab active';
        tabEl.id = 'tab-' + id;
        tabEl.innerHTML =
            '<span class="tab-dot"></span>' +
            '<span class="tab-label">Terminal ' + id + '</span>' +
            '<span class="tab-close" data-id="' + id + '">✕</span>';
        tabEl.addEventListener('click', function (e) {
            if (e.target.dataset.id) { closeTab(+e.target.dataset.id); }
            else { switchTab(id); }
        });
        document.getElementById('tab-bar-tabs').appendChild(tabEl);

        var tab = { id: id, term: term, fit: fit, ws: null, retryCount: 0, retryDelay: 1000, retryTimer: null };
        tabs.push(tab);

        term.onData(function (data) { tabSend(tab, {type: 'input', data: data}); });
        term.onResize(function (sz) { tabSend(tab, {type: 'resize', cols: sz.cols, rows: sz.rows}); });

        // fit after browser renders the visible wrap, then connect so
        // ws.onopen sends correct cols/rows on the very first resize message
        requestAnimationFrame(function () {
            fit.fit();
            connectTab(tab);
        });
    }

    // ── WebSocket per tab ─────────────────────────────────────────────
    function connectTab(tab) {
        var ws = new WebSocket(wsUrl);
        tab.ws = ws;

        ws.onopen = function () {
            if (tab.retryTimer) {
                tab.term.writeln('\r\n\x1b[32m── reconnected ──\x1b[0m\r\n');
                tab.retryTimer = null;
            }
            tab.retryCount = 0;
            tab.retryDelay = 1000;
            tabSend(tab, {type: 'resize', cols: tab.term.cols, rows: tab.term.rows});
        };

        ws.onmessage = function (e) {
            tab.term.write(e.data);
            // Notify activity on inactive tabs
            if (tab.id !== activeId) {
                var el = document.getElementById('tab-' + tab.id);
                if (el) el.classList.add('has-activity');
            }
        };

        ws.onclose = function (event) {
            if (event.code === 1000) {
                tab.term.writeln('\r\n\x1b[38;5;240m── session ended ──\x1b[0m');
            } else if (event.code === 4000) {
                tab.term.writeln('\r\n\x1b[38;5;240m── idle timeout ──\x1b[0m');
            } else if (tab.retryCount < 8) {
                tab.retryCount++;
                var sec = tab.retryDelay / 1000;
                tab.term.writeln('\r\n\x1b[33m── reconnecting in ' + sec + 's (' + tab.retryCount + '/8) ──\x1b[0m');
                tab.retryTimer = setTimeout(function () { connectTab(tab); }, tab.retryDelay);
                tab.retryDelay = Math.min(tab.retryDelay * 2, 30000);
            } else {
                tab.term.writeln('\r\n\x1b[31m── connection lost ──\x1b[0m');
            }
        };

        ws.onerror = function () {};
    }

    function tabSend(tab, msg) {
        if (tab.ws && tab.ws.readyState === WebSocket.OPEN) {
            tab.ws.send(JSON.stringify(msg));
        }
    }

    // ── Switch active tab ─────────────────────────────────────────────
    function switchTab(id) {
        activeId = id;
        tabs.forEach(function (t) {
            var wrap = document.getElementById('wrap-' + t.id);
            var tabEl = document.getElementById('tab-' + t.id);
            if (t.id === id) {
                wrap.classList.add('active');
                tabEl.classList.add('active');
                tabEl.classList.remove('has-activity');
                requestAnimationFrame(function () { t.fit.fit(); });
            } else {
                wrap.classList.remove('active');
                tabEl.classList.remove('active');
            }
        });
    }

    // ── Close a tab ───────────────────────────────────────────────────
    function closeTab(id) {
        if (tabs.length === 1) return; // keep at least one tab
        var tab = tabs.find(function (t) { return t.id === id; });
        if (!tab) return;

        if (tab.retryTimer) clearTimeout(tab.retryTimer);
        if (tab.ws) tab.ws.close(1000, 'tab closed');
        tab.term.dispose();

        document.getElementById('wrap-' + id).remove();
        document.getElementById('tab-' + id).remove();
        tabs = tabs.filter(function (t) { return t.id !== id; });

        if (activeId === id) switchTab(tabs[tabs.length - 1].id);
    }

    // ── Init ──────────────────────────────────────────────────────────
    document.getElementById('btn-add-tab').addEventListener('click', createTab);
    document.addEventListener('keydown', function (e) { if (e.altKey && e.key === 't') { e.preventDefault(); createTab(); } });

    var resizeTimer = null;
    new ResizeObserver(function () {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function () {
            tabs.forEach(function (t) {
                if (t.id === activeId) t.fit.fit();
            });
        }, 100);
    }).observe(document.getElementById('terminals'));

    createTab();
})();
</script>
</body>
</html>
