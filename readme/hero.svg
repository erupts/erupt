<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" preserveAspectRatio="xMidYMid meet" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Roboto Mono', monospace">
  <title>Erupt — Universal Data Management Framework</title>

  <defs>
    <style>
      .text    { fill: #1a1a1a; font-weight: 500; }
      .muted   { fill: #666; }
      .label   { fill: #888; font-size: 12px; }
      .border  { stroke: #c0c0c0; fill: none; }
      .card    { fill: rgba(0,0,0,0.015); stroke: #c0c0c0; }
      .accent        { fill: #FF5722; font-weight: 600; }
      .accent-bg     { fill: #FF5722; }
      .accent-stroke { stroke: #FF5722; fill: none; }
      .dot     { fill: #c0c0c0; }
      .tagline { fill: #444; font-weight: 600; }
      @media (prefers-color-scheme: dark) {
        .text    { fill: #ffffff; font-weight: 500; }
        .muted   { fill: #d0d0d0; }
        .label   { fill: #b8b8b8; font-size: 12px; }
        .border  { stroke: #666; }
        .card    { fill: rgba(255,255,255,0.04); stroke: #666; }
        .dot     { fill: #6a6a6a; }
        .tagline { fill: #e0e0e0; }
      }
    </style>
    <pattern id="dotgrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" class="dot"/>
    </pattern>
  </defs>

  <!-- Four orange L corner brackets -->
<!--  <g class="accent-stroke" stroke-width="2" stroke-linecap="square">-->
<!--    <path d="M 60 30 L 30 30 L 30 60"/>-->
<!--    <path d="M 1140 30 L 1170 30 L 1170 60"/>-->
<!--    <path d="M 60 310 L 30 310 L 30 280"/>-->
<!--    <path d="M 1140 310 L 1170 310 L 1170 280"/>-->
<!--  </g>-->

  <!-- Engineering tick marks on top edge -->
  <g class="accent-bg">
    <polygon points="300,28 306,40 294,40"/>
    <polygon points="600,28 606,40 594,40"/>
    <polygon points="900,28 906,40 894,40"/>
  </g>

  <!-- Top dot grid band -->
  <rect x="60" y="58" width="1080" height="4" fill="url(#dotgrid)"/>

  <!-- ───────── LEFT CARD : the @Erupt annotation ───────── -->
  <rect x="80" y="88" width="380" height="184" rx="4" class="card"/>
  <line x1="80" y1="116" x2="460" y2="116" class="border"/>
  <text x="98" y="108" class="label">User.java</text>
  <text x="446" y="108" text-anchor="end" class="label">@Erupt</text>

  <g font-size="16">
    <text x="100" y="148">
      <tspan class="accent">@Erupt</tspan><tspan class="text">(name = "User")</tspan>
    </text>
    <text x="100" y="174" class="muted">@Entity</text>
    <text x="100" y="200">
      <tspan class="text">public class </tspan><tspan class="accent">User</tspan><tspan class="text"> {</tspan>
    </text>
    <text x="120" y="226" class="accent">@EruptField</text>
    <text x="120" y="252" class="text">String name;</text>
    <text x="100" y="270" class="text">}</text>
  </g>

  <!-- ───────── MIDDLE : arrow ───────── -->
  <text x="610" y="172" text-anchor="middle" class="muted" font-size="13">// generates</text>
  <line x1="490" y1="190" x2="725" y2="190" class="accent-stroke" stroke-width="2"/>
  <polygon class="accent-bg" points="740,190 725,183 725,197"/>
  <text x="610" y="222" text-anchor="middle" class="label">zero controllers · zero frontend</text>

  <!-- ───────── RIGHT CARD : the generated admin UI ───────── -->
  <rect x="760" y="88" width="380" height="184" rx="4" class="card"/>

  <!-- Title bar -->
  <line x1="760" y1="116" x2="1140" y2="116" class="border"/>
  <g class="muted">
    <circle cx="776" cy="103" r="3"/>
    <circle cx="789" cy="103" r="3"/>
    <circle cx="802" cy="103" r="3"/>
  </g>
  <text x="950" y="108" text-anchor="middle" class="label">erupt.xyz / users</text>

  <!-- Toolbar -->
  <rect x="780" y="130" width="180" height="22" rx="2" class="card"/>
  <text x="790" y="146" class="muted" font-size="12">search…</text>

  <rect x="1000" y="130" width="56" height="22" rx="2" class="accent-bg"/>
  <text x="1028" y="146" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">+ Add</text>

  <rect x="1066" y="130" width="64" height="22" rx="2" class="card"/>
  <text x="1098" y="146" text-anchor="middle" class="muted" font-size="12">Export</text>

  <!-- Table -->
  <g font-size="12">
    <line x1="780" y1="170" x2="1120" y2="170" class="border"/>
    <text x="790" y="185" class="label">Name</text>
    <text x="910" y="185" class="label">Email</text>
    <text x="1020" y="185" class="label">Created</text>
    <line x1="780" y1="193" x2="1120" y2="193" class="border"/>

    <text x="790" y="212" class="text">Alice Chen</text>
    <text x="910" y="212" class="muted">a@e.io</text>
    <text x="1020" y="212" class="muted">2026-05-12</text>
    <line x1="780" y1="220" x2="1120" y2="220" class="border"/>

    <text x="790" y="238" class="text">Bob Liu</text>
    <text x="910" y="238" class="muted">b@e.io</text>
    <text x="1020" y="238" class="muted">2026-05-11</text>
    <line x1="780" y1="246" x2="1120" y2="246" class="border"/>

    <text x="790" y="264" class="text">Charlie Wu</text>
    <text x="910" y="264" class="muted">c@e.io</text>
    <text x="1020" y="264" class="muted">2026-05-10</text>
  </g>

  <!-- Bottom dot grid band -->
  <rect x="60" y="278" width="1080" height="4" fill="url(#dotgrid)"/>

  <!-- Bottom engineering-drawing-style labels -->
  <text x="60" y="328" class="label">erupt · universal data management framework · ai harness</text>
  <text x="1140" y="328" text-anchor="end" class="label">drawing №1 · v1.14</text>
</svg>
