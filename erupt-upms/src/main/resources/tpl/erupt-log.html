<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <base href="${base}/">
    <title>erupt-log</title>
    <link href="log/xterm.css" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'JetBrains Mono';
            src: url('font/JetBrainsMono-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
        }

        @font-face {
            font-family: 'JetBrains Mono';
            src: url('font/JetBrainsMono-Bold.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
        }

        html, body {
            height: 100%;
            margin: 0;
        }

        .term-wrap {
            background: #1b2027;
            position: fixed;
            inset: 0;
            padding: 8px 12px;
        }
    </style>
</head>
<body>
<div class="term-wrap">
    <div id="terminal" style="width:100%;height:100%;">

    </div>
</div>
<script src="log/axios.min.js"></script>
<script src="log/xterm.js"></script>
<script src="log/xterm-addon-fit.js"></script>
<script src="log/xterm-addon-web-links.js"></script>
<script src="log/xterm-addon-search.js"></script>
<script>
    let cloudNode = new URLSearchParams(location.search).get("_erupt") === 'CloudNode';

    const xterm = new Terminal({
        convertEol: true,
        fontFamily: '"JetBrains Mono","Fira Code","Cascadia Code",Menlo,Monaco,"Courier New",monospace',
        fontSize: 14,
        lineHeight: 1.25,
        cursorBlink: true,
        cursorStyle: 'bar',
        disableStdin: true,
        theme: {
            background: '#1b2027',
            foreground: '#abb2bf',
            cursor: '#528bff',
            cursorAccent: '#1b2027',
            selectionBackground: 'rgba(82,139,255,0.25)',
            black: '#1b2027',
            red: '#e06c75',
            green: '#98c379',
            yellow: '#e5c07b',
            blue: '#61afef',
            magenta: '#c678dd',
            cyan: '#56b6c2',
            white: '#abb2bf',
            brightBlack: '#5c6370',
            brightRed: '#e06c75',
            brightGreen: '#98c379',
            brightYellow: '#e5c07b',
            brightBlue: '#61afef',
            brightMagenta: '#c678dd',
            brightCyan: '#56b6c2',
            brightWhite: '#ffffff'
        }
    });
    xterm.loadAddon(new WebLinksAddon.WebLinksAddon());
    let searchAddon = new SearchAddon.SearchAddon();
    // let searchAddonBar = new SearchAddonBar.SearchAddonBar({searchAddon});
    xterm.loadAddon(searchAddon);
    let fitAddon = new FitAddon.FitAddon();
    xterm.loadAddon(fitAddon)
    // xterm.loadAddon(searchAddonBar);
    xterm.open(document.getElementById('terminal'));
    let offset = null;

    function getLog() {
        let url = cloudNode ? 'erupt-cloud-api/erupt-cloud-node-log' : "erupt-api/tool/erupt-log"
        axios.get(url, {
            headers: {
                token: parent.getAppToken().token,
            },
            params: {
                size: 500,
                offset: offset,
                nodeName: cloudNode && '${rows[0].nodeName}'
            }
        }).then((res) => {
            for (let key in res.data) {
                xterm.writeln(res.data[key].content);
                offset = res.data[key].num;
            }
            if (res.data.length > 0) {
                fitAddon.fit()
            }
        }, error => {
            if (error.response) {
                if (error.response.status === 401) {
                    window.parent.location.reload();
                } else if (error.response.status === 403) {
                    window.location.href = "${base}/error/403.html"
                } else {
                    xterm.writeln("status: " + error.response.status + (error.response.data && (" → " + error.response.data.message)));
                }
            } else {
                xterm.writeln(error.message);
                offset = null;
            }
        });
    }

    getLog();
    setInterval(function () {
        getLog();
    }, 1500)
    window.onresize = function () {
        fitAddon.fit()
    }
</script>
</body>
</html>
