# TODO 示例为 H2 数据库，可根据实际情况调整为mysql等数据库
spring:
  datasource:
    url: jdbc:h2:file:./erupt;AUTO_SERVER=TRUE;MODE=MySQL;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    show-sql: false
    generate-ddl: true
    database: h2
    properties:
      hibernate:
        globally_quoted_identifiers: true
        type.enumeration.use_named: false # Make Hibernate 6 not use native enums and switch back to varchar.
erupt:
  ai:
    mcp:
      enabled: true
    system-prompt: 你是一个 Aftership 智能助手，根据用户提供的上下文，生成合适的回答。