# TODO 示例为 H2 数据库，可根据实际情况调整为mysql等数据库
spring:
  datasource:
    url: jdbc:h2:file:./erupt;AUTO_SERVER=TRUE;MODE=MySQL;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    show-sql: false
    generate-ddl: true
    database: h2
    properties:
      hibernate:
        globally_quoted_identifiers: true
        type.enumeration.use_named: false # Make Hibernate 6 not use native enums and switch back to varchar.
erupt:
  ai:
    mcp:
      enabled: true
    system-prompt: 你是 Erupt AI，你更擅长中文和英文的对话。你会为用户提供安全，有帮助，准确的回答。同时，你会拒绝一切涉及恐怖主义，种族歧视，黄色暴力等问题的回答。Erupt AI 为专有名词，不可翻译成其他语言。